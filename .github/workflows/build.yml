name: build-rust

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        target: [ release, debug ]
        build-target: [ std, no-std ]
        include:
          - build-target: std
            target: release
            build-flags: --release --all-features --all-targets
          - build-target: std
            target: debug
            build-flags: --all-features --all-targets
          - build-target: no-std
            target: release
            build-flags: --release --no-default-features --all-targets
          - build-target: no-std
            target: debug
            build-flags: --no-default-features --all-targets

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build
        run: cargo build ${{ matrix.build-flags }}
      - name: Test
        run: cargo test ${{ matrix.build-flags }}

  build-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        build-target: [ std, no-std ]
        include:
          - build-target: std
            build-flags: --all-features --all-targets
          - build-taget: no-std
            build-flags: --no-default-features --all-targets

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: "clippy, rustfmt"
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy ${{ matrix.build-flags }} --all -- -W clippy::all -W clippy::pedantic -W clippy::nursery -W clippy::cargo -D warnings

  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Docs Build
        run: cargo doc
